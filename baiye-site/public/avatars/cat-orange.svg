  <line x1="15" y1="68" x2="32" y2="66" stroke="#D4893E" stroke-width="0.8" stroke-linecap="round"/>
  <!-- 胡须右 -->
  <line x1="68" y1="58" x2="85" y2="56" stroke="#D4893E" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="68" y1="62" x2="85" y2="62" stroke="#D4893E" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="68" y1="66" x2="85" y2="68" stroke="#D4893E" stroke-width="0.8" stroke-linecap="round"/>
